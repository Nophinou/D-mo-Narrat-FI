---
gameTitle: Narrat Demo
saveFileName: Narrat Demo
dialogPanel:
  allowHistoryToggling: false # This will add a button with the auto/skip button that allows the player to toggle viewing dialog history.
  overlayMode: true
  rightOffset: 20
  bottomOffset: 0
  width: 502
  height: 720
  textSpeed: 0
  animateText: false
  timeBetweenLines: 100
  historyLength: 200 # The number of dialogue lines to keep in the history
  hideDuringTransition: false # Setting this to true will make the dialog panel hide during screen transitions
  showAfterScriptEnd: true # Setting this to true will make the dialog panel stay on even if the narrat script ends
  showChoiceOutcomes: false 
  showOldChoices: false
  TopPadding: 1500
input:
  showPromptsOnGamepad: false
  showPromptsOnKeyboard: false
  showBottomLegend: false
graphics:
  allowFullscreen: true
layout:
  backgrounds:
    width: 1280
    height: 720
  dialogBottomPadding: 50
  mobileDialogHeightPercentage: 60
  verticalLayoutThreshold: 0
  portraits:
    width: 150
    height: 225
notifications:
  timeOnScreen: 5
  alsoPrintInDialogue: false
hudStats:
  money:
    icon: img/ui/money.webp
    name: Money
    startingValue: 10
    minValue: 0
  energy:
    icon: img/ui/energy.webp
    name: Energy
    startingValue: 10
    minValue: 0
    maxValue: 10
saves:
  mode: manual
  slots: 3
  runOnReload: 'reload'
  autosaveDisabledOnLabels:
    - test_no_autosave
  allowManualSave: true
  autosaveFeedback:
    enabled: false
    duration: 0.5
    text: saving...
    backgroundImage: 'img/ui/autosave_spinner_background.png'
    foregroundImage: 'img/ui/autosave_spinner.png'
