animations:
  rotate:
    keyframes: rotate
    options:
      duration: 1000
      iterations: 1
      fill: forwards
      composite: accumulate
      iterationComposite: accumulate
  bump:
    keyframes: bump
    options:
      duration: 400
      iterations: 1
      fill: forwards
      composite: accumulate
      iterationComposite: accumulate
  appear:
    keyframes: appear
    options:
      duration: 2000
      iterations: 1
      fill: forwards 
      composite: accumulate
      iterationComposite: accumulate



keyframes:
  rotate:
    - transform: rotate(0deg)
    - transform: rotate(360deg)
  appear:
    - opacity: 0%
    - opacity: 100%
  bump:
    - transform: translate(0,0px) rotate(0deg)
    - transform: translate(0,-10px) rotate(-30deg) scale(1.3)
    - transform: translate(0,0px) rotate(0deg)
